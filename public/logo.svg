<svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring (wave 2) -->
  <circle cx="55" cy="55" r="52" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.07"/>
  <!-- Inner ring (wave 1) -->
  <circle cx="55" cy="55" r="42" stroke="currentColor" stroke-width="2" fill="none" opacity="0.14"/>
  <!-- Main glass circle - fill -->
  <circle cx="55" cy="55" r="32" fill="currentColor" opacity="0.09"/>
  <!-- Main glass circle - stroke -->
  <circle cx="55" cy="55" r="32" stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.28"/>
  <!-- Glass highlight (top half ellipse) -->
  <ellipse cx="55" cy="41" rx="24" ry="15" fill="white" opacity="0.03"/>
  <!-- Keyhole: circle -->
  <circle cx="55" cy="49" r="7.5" fill="currentColor"/>
  <!-- Keyhole: pill -->
  <rect x="51" y="54" width="8" height="15" rx="4" fill="currentColor"/>
</svg>